<div class="flex flex-col h-full">

  <!-- Header -->
  <div class="px-6 py-5 border-b border-gray-100">
    <h2 class="text-xl font-bold text-gray-900">Current Bill</h2>
  </div>

  <!-- Cart items / empty state -->
  <div class="flex-1 overflow-y-auto px-6">

    @if (cartItems.length === 0) {
      <div class="h-full flex flex-col items-center justify-center text-center py-16">
        <p class="text-gray-500 font-medium">No items in cart</p>
        <p class="text-sm text-gray-400 mt-1">Add products to start billing</p>
      </div>
    } @else {
      @for (item of cartItems; track item.product.id) {
        <app-cart-item
          [item]="item"
          (quantityChange)="quantityChange.emit($event)"
          (remove)="removeItem.emit($event)"
        ></app-cart-item>
      }
    }

  </div>

  <!-- Summary -->
  <app-bill-summary [cartItems]="cartItems"></app-bill-summary>

  <!-- Actions -->
  <div class="grid grid-cols-2 gap-3 px-6 py-4">
    <button
      (click)="hold.emit()"
      class="flex items-center justify-center gap-2 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z"/>
      </svg>
      Hold
    </button>

    <button
      (click)="clear.emit()"
      class="flex items-center justify-center gap-2 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
      Clear
    </button>
  </div>

</div>
