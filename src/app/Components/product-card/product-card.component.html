<div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col">

  <!-- Icon -->
  <div class="w-14 h-14 rounded-lg bg-gray-50 flex items-center justify-center text-3xl mb-3">
    {{ product.icon }}
  </div>

  <!-- Name + category -->
  <h4 class="font-semibold text-gray-900">{{ product.name }}</h4>
  <p class="text-sm text-gray-400 mt-0.5">{{ product.category }}</p>

  <!-- Price + stock -->
  <div class="flex items-center justify-between mt-3">
    <span class="font-bold text-gray-900">₹{{ product.price }}</span>
    <span class="text-sm text-gray-400">Stock: {{ product.stock }}</span>
  </div>

  <!-- Add to cart -->
  <button
    (click)="onAddToCart()"
    [disabled]="product.stock === 0"
    class="mt-4 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold rounded-lg py-2.5 flex items-center justify-center gap-2 transition-colors"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
    </svg>
    Add to Cart
  </button>

</div>
