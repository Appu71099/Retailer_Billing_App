<div class="bg-white rounded-xl border border-gray-200 p-4 mt-6 flex items-center gap-4 flex-wrap">

  <!-- Label with calendar icon -->
  <div class="flex items-center gap-2 text-gray-700 font-medium">
    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
    <span>Date Range:</span>
  </div>

  <!-- Pill buttons -->
  <div class="flex items-center gap-3">
    @for (range of ranges; track range) {
      <button
        (click)="onSelect(range)"
        class="px-5 py-2 rounded-full font-medium text-sm transition-colors"
        [class.bg-blue-600]="selected === range"
        [class.text-white]="selected === range"
        [class.bg-gray-100]="selected !== range"
        [class.text-gray-700]="selected !== range"
        [class.hover:bg-gray-200]="selected !== range"
      >
        {{ range }}
      </button>
    }
  </div>

</div>
