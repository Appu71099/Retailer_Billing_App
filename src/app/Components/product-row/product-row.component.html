<tr class="border-b border-gray-100 hover:bg-gray-50">

  <!-- Image -->
  <td class="px-6 py-4">
    <div class="w-10 h-10 rounded-lg bg-gray-50 flex items-center justify-center text-2xl">
      {{ product.image }}
    </div>
  </td>

  <!-- Name -->
  <td class="px-6 py-4 font-semibold text-gray-900">{{ product.name }}</td>

  <!-- SKU -->
  <td class="px-6 py-4 text-gray-500">{{ product.sku }}</td>

  <!-- Category -->
  <td class="px-6 py-4">
    <app-category-badge [category]="product.category"></app-category-badge>
  </td>

  <!-- Price -->
  <td class="px-6 py-4 font-semibold text-gray-900">₹{{ product.price }}</td>

  <!-- Stock -->
  <td class="px-6 py-4">
    <app-stock-badge [stock]="product.stock"></app-stock-badge>
  </td>

  <!-- Actions -->
  <td class="px-6 py-4">
    <div class="flex items-center gap-3">
      <button (click)="edit.emit(product.id)" class="text-blue-500 hover:text-blue-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </button>
      <button (click)="delete.emit(product.id)" class="text-red-500 hover:text-red-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </td>

</tr>
