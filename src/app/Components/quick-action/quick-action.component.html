<a [routerLink]="action.route"
  class="flex items-start gap-4 p-5 rounded-xl border border-gray-200 hover:border-gray-300 hover:shadow-sm transition-all group"
>
  <!-- Icon -->
  <div [class]="'w-12 h-12 rounded-lg flex items-center justify-center shrink-0 ' + action.iconBg + ' ' + action.iconColor">

    @if (action.icon === 'bill') {
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m-6 4h6m-6 4h4M5 3h14a1 1 0 011 1v16a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1z"/>
      </svg>
    } @else if (action.icon === 'add-product') {
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
      </svg>
    } @else if (action.icon === 'reports') {
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6m4 6V7m4 10v-3M5 21h14a1 1 0 001-1V4a1 1 0 00-1-1H5a1 1 0 00-1 1v16a1 1 0 001 1z"/>
      </svg>
    } @else if (action.icon === 'orders') {
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
    }

  </div>

  <!-- Text -->
  <div class="flex-1">
    <h4 class="font-semibold text-gray-900">{{ action.title }}</h4>
    <p class="text-sm text-gray-500 mt-0.5">{{ action.description }}</p>
  </div>

  <!-- Arrow -->
  <svg class="w-5 h-5 text-gray-300 group-hover:text-gray-400 mt-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
  </svg>
</a>
