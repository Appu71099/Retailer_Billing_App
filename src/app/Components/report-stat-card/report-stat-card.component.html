<div class="bg-white rounded-xl border border-gray-200 p-6">

  <!-- Icon + label -->
  <div class="flex items-center gap-3">
    <div [class]="'w-11 h-11 rounded-lg flex items-center justify-center ' + data.iconBg + ' ' + data.iconColor">

      @if (data.icon === 'dollar') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V6m0 10v2"/>
          <circle cx="12" cy="12" r="9" stroke-width="2"/>
        </svg>
      } @else if (data.icon === 'bag') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 11H4L5 9z"/>
        </svg>
      } @else if (data.icon === 'box') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      } @else if (data.icon === 'trend') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
        </svg>
      }

    </div>
    <span class="text-gray-500">{{ data.label }}</span>
  </div>

  <!-- Value -->
  <p class="text-3xl font-bold text-gray-900 mt-4">{{ data.value }}</p>

  <!-- Trend -->
  <div
    class="flex items-center gap-1.5 mt-3 text-sm font-medium"
    [class.text-green-600]="data.trendType === 'positive'"
    [class.text-red-600]="data.trendType === 'negative'"
  >
    @if (data.trendType === 'positive') {
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
      </svg>
    } @else {
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"/>
      </svg>
    }
    <span>{{ data.trend }}</span>
  </div>

  
</div>
