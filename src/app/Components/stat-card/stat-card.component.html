<div class="bg-white rounded-xl border border-gray-200 p-6">

  <!-- Top row: icon + change badge -->
  <div class="flex items-center justify-between">

    <!-- Icon box -->
    <div [class]="'w-12 h-12 rounded-lg flex items-center justify-center ' + data.iconBg + ' ' + data.iconColor">

      @if (data.icon === 'dollar') {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V6m0 10v2"/>
          <circle cx="12" cy="12" r="9" stroke-width="2"/>
        </svg>
      } @else if (data.icon === 'bag') {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 11H4L5 9z"/>
        </svg>
      } @else if (data.icon === 'users') {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m9-5.13a4 4 0 11-8 0 4 4 0 018 0zM9 20a4 4 0 014-4h0a4 4 0 014 4"/>
        </svg>
      } @else if (data.icon === 'box') {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      }

    </div>

    <!-- Change badge -->
    <span
      class="text-sm font-medium px-2.5 py-1 rounded-full"
      [class.bg-green-50]="data.changeType === 'positive'"
      [class.text-green-600]="data.changeType === 'positive'"
      [class.bg-red-50]="data.changeType === 'negative'"
      [class.text-red-600]="data.changeType === 'negative'"
    >
      {{ data.change }}
    </span>
  </div>

  <!-- Value -->
  <p class="text-3xl font-bold text-gray-900 mt-4">{{ data.value }}</p>

  <!-- Label -->
  <p class="text-gray-500 mt-1">{{ data.label }}</p>

</div>
