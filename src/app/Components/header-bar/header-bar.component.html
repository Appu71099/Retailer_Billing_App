<header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8">

  <!-- Page Title -->
  <h2 class="text-2xl font-bold text-gray-900">{{ title }}</h2>

  <!-- Right side actions -->
  <div class="flex items-center gap-6">

    <!-- Notification Bell -->
    <button class="relative text-gray-500 hover:text-gray-700">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>

      @if (hasNotifications) {
        <span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 rounded-full"></span>
      }
    </button>

    <!-- Divider -->
    <div class="h-8 w-px bg-gray-200"></div>

    <!-- User Profile -->
    <div class="flex items-center gap-3">
      @if (user.avatarUrl) {
        <img [src]="user.avatarUrl" alt="avatar" class="w-10 h-10 rounded-full object-cover" />
      } @else {
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
          <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
      }

      <div class="leading-tight">
        <p class="text-sm font-semibold text-gray-900">{{ user.name }}</p>
        <p class="text-xs text-gray-500">{{ user.role }}</p>
      </div>
    </div>

    <!-- Logout -->
    <button class="text-gray-400 hover:text-gray-600" (click)="onLogout()">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
    </button>

  </div>
</header>
